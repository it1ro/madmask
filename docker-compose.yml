# Build: `build.network: host` avoids BuildKit bridge/veth failures on some Linux setups.
# Runtime: `network_mode: host` avoids attaching the container to compose’s default bridge
# (same veth error can appear at `docker compose up`, not only during build).
# If build still fails: DOCKER_BUILDKIT=0 docker compose build && docker compose up
# Note: `network_mode: host` is intended for Linux dev. Docker Desktop (Mac/Windows) does
# not support true host networking; use bridge + ports there if needed.
services:
  web:
    build:
      context: .
      network: host
    network_mode: host
    working_dir: /app
    environment:
      RAILS_ENV: development
      RACK_ENV: development
      # Twelve-Factor friendly logging when running Rails/Puma in the container
      RAILS_LOG_TO_STDOUT: "true"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    stdin_open: true
    tty: true
    command:
      - bash
      - -lc
      - |
        if [[ -f bin/rails ]]; then
          exec bin/rails server -b 0.0.0.0 -p 3000
        else
          echo "Rails app missing — run rails new in /app or docker compose run --rm web bash"
          sleep infinity
        fi

volumes:
  bundle_cache:
