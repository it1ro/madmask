  pages:
    about:
      title: "О мастерской"
      meta_description: "Madmask — мастерская масок. Ручная сборка, малые серии и кастом под референсы."
      lead: "Кто мы, как работаем и где нас найти."
      blocks:
        who:
          title: "Madmask"
          body: |
            Мы делаем маски и аксессуары для сцены, съёмок и косплея.
            Работаем малыми сериями и берём кастом под референсы.
        how:
          title: "Как устроен заказ"
          body: |
            Вы выбираете позицию в каталоге или описываете идею.
            Мы уточняем детали, материалы, финиш и сроки — после этого подтверждаем заказ.
        where:
          title: "Соцсети и связь"
          body: |
            Актуальные новости, примеры работ и связь — в соцсетях.
            Если удобнее — используйте форму заявки на сайте.
    delivery_payment:
      title: "Доставка и оплата"
      meta_description: "Способы доставки и варианты оплаты для Madmask."
      lead: "Коротко о доставке, оплате и нюансах отправки."
      blocks:
        delivery:
          title: "Доставка"
          body: |
            Доставка по РФ и самовывоз (если доступно).
            Точный способ и стоимость согласуем при подтверждении заказа.
        payment:
          title: "Оплата"
          body: |
            Оплата переводом/картой (варианты уточняются в переписке).
            Для кастома возможна предоплата — зависит от объёма работ.
        notes:
          title: "Важно"
          body: |
            Сроки отправки зависят от наличия и графика изготовления.
            Упаковку подбираем так, чтобы защитить финиш и элементы декора.
    lead_times_custom:
      title: "Сроки и кастом"
      meta_description: "Сроки изготовления и логика кастом-заказов Madmask."
      lead: "Как понять сроки и что нужно для кастомного заказа."
      blocks:
        ready:
          title: "В наличии"
          body: |
            Готовые позиции зависят от текущего наличия.
            Если позиция есть — подскажем ближайшую дату отправки.
        custom:
          title: "Кастом"
          body: |
            Сроки кастома зависят от сложности, материалов и финиша.
            Мы скажем ориентир после короткого брифа и просмотра референсов.
        brief:
          title: "Что прислать"
          body: |
            2–5 референсов, желаемый жанр/настроение, где будете использовать (сцена/съёмка/косплей),
            и любые требования к посадке/креплению.
    materials_care:
      title: "Материалы и уход"
      meta_description: "Материалы и рекомендации по уходу за изделиями Madmask."
      lead: "База, финиш и простые правила, чтобы изделие жило дольше."
      blocks:
        materials:
          title: "Материалы"
          body: |
            Мы подбираем материалы под задачу и визуальный эффект.
            Конкретную комплектацию и финиш уточняем при подтверждении заказа.
        care:
          title: "Уход"
          body: |
            Берегите финиш от царапин и агрессивной химии.
            Храните в сухом месте, без сильного нагрева и прямых солнечных лучей.
        safety:
          title: "Безопасность"
          body: |
            Если изделие используется на длительных мероприятиях, сообщите — мы подскажем варианты комфортной посадки.
    faq:
      title: "FAQ"
      meta_description: "Частые вопросы по заказам Madmask."
      lead: "Собрали ответы на основные вопросы."
      blocks:
        how_to_order:
          title: "Как заказать?"
          body: |
            Откройте товар и нажмите «Оставить заявку», либо отправьте бриф для кастома.
            Мы уточним детали и вернёмся с наличием/сроками.
        can_change:
          title: "Можно ли изменить финиш/цвет?"
          body: |
            Да, в большинстве случаев варианты возможны.
            Напишите пожелания в заявке и приложите референсы.
        support:
          title: "Где быстрее отвечают?"
          body: |
            Быстрее всего — в соцсетях.
            Но заявки с сайта тоже читаем регулярно.
    contacts:
      title: "Контакты"
      meta_description: "Контакты и соцсети Madmask."
      lead: "Связь, соцсети и почта."
      blocks:
        social:
          title: "Соцсети"
          body: |
            VK: https://vk.com/madmask73
            Telegram: https://t.me/
        email:
          title: "Почта"
          body: |
            По вопросам сотрудничества и заказов можно писать на почту (уточним в ответе на заявку).

