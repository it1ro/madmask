# Tuning under load: reduce threads/processes or set SOLID_QUEUE_IN_PUMA=false and run bin/jobs on a separate host.
# See config/deploy.yml (JOB_CONCURRENCY, SOLID_QUEUE_IN_PUMA).
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
